services:
  # Backend Web Service
  - type: web
    name: okk-code-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # User must set this in Render dashboard
      - key: JWT_SECRET
        sync: false # User must set this in Render dashboard

  # Frontend Web Service (Next.js)
  - type: web
    name: okk-code-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://okk-code-backend.onrender.com/api/v1 # Update this after backend is deployed
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://okk-code-backend.onrender.com
